name: Create Release Assets

on:
  push:
    tags:
      - 'v*' # Startet, wenn ein Tag v0.1.1 etc. gepusht wird

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Plugin als ZIP packen (ohne den ganzen Rest)
      - name: Zip Plugin
        run: |
          cd Bo_Projektstart
          zip -r ../Bo_Projektstart.zip .
          cd ..

      # 2. Dokumentation separat packen
      - name: Zip Documentation
        run: |
          zip -r documentation.zip doc/ readme.md

      # 3. Den offiziellen GitHub Release erstellen und Dateien hochladen
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Bo_Projektstart.zip
            documentation.zip
          name: Release ${{ github.ref_name }}
          body: |
            Automatisierter Release für Version ${{ github.ref_name }}.
            - `Bo_Projektstart.zip`: Nur das Plugin-Verzeichnis.
            - `documentation.zip`: Dokumentation und Readme.
          draft: false
          prerelease: false
