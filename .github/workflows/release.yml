name: Update Metadata & Create Release Assets

on:
  release:
    types: [published] # Startet erst, wenn der Release veröffentlicht wird

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main # Wir arbeiten auf dem Main, um die Version dort zu speichern
          fetch-depth: 0

      - name: Update Metadata Version
        id: get_version
        run: |
          # Nutzt den Tag-Namen des Releases (z.B. v1.2.3)
          VERSION=${{ github.event.release.tag_name }}
          # Schreibt die Version (ohne v) in die metadata.txt
          sed -i "s/^version=.*/version=${VERSION#v}/" bo_projektstart/metadata.txt
          echo "CLEAN_VERSION=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Commit and Push to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add bo_projektstart/metadata.txt
          # Nur committen, wenn sich etwas geändert hat
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update version to ${{ steps.get_version.outputs.CLEAN_VERSION }} [skip ci]" && git push origin main)

      - name: Zip Assets
        run: |
          zip -r bo_projektstart.zip bo_projektstart/
          zip -r documentation.zip docs/ README.md

      - name: Upload Assets to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bo_projektstart.zip
            documentation.zip
          # Da der Release schon existiert (Trigger!), werden die Dateien einfach angehängt
