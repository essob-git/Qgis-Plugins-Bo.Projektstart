name: Auto Update Version in Metadata

on:
  push:
    tags:
      - 'v*' # Reagiert auf Tags wie v0.1.1, v1.0.0 etc.

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Wichtig, damit die Action pushen darf
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main # Wir arbeiten auf dem main Branch

      - name: Get tag version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update metadata.txt
        run: |
          # Ersetzt die Zeile, die mit 'version=' beginnt, durch die neue Tag-Version
          sed -i "s/^version=.*/version=${{ steps.get_version.outputs.VERSION }}/" Bo_Projektstart/metadata.txt
          
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Bo_Projektstart/metadata.txt
          git commit -m "chore: update version to ${{ steps.get_version.outputs.VERSION }} [skip ci]"
          git push origin main
